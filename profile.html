<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — MarineFPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root { --gold: #e8c84a; --bg: #080808; --border: #222; --text: #e0e0e0; --text-muted: #666; }
        body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        nav { display: flex; justify-content: space-between; padding: 0 32px; height: 56px; border-bottom: 1px solid var(--border); align-items: center; }
        .logo { color: var(--gold); text-decoration: none; font-weight: 700; font-family: 'Barlow Condensed'; letter-spacing: 2px; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 24px; }
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; padding-bottom: 40px; border-bottom: 1px solid var(--border); }
        .username { font-family: 'Barlow Condensed'; font-size: 48px; color: #fff; text-transform: uppercase; margin: 0; }
        .stat-card { background: #111; padding: 20px; border-radius: 4px; border: 1px solid var(--border); min-width: 150px; }
        .stat-val { display: block; font-size: 24px; font-weight: 700; color: var(--gold); }
        .stat-lab { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .post-list-item { background: #0f0f0f; border: 1px solid var(--border); padding: 20px; margin-bottom: 12px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .status-badge { font-size: 10px; padding: 4px 8px; border-radius: 2px; text-transform: uppercase; font-weight: 700; }
        .status-pending { background: rgba(232, 200, 74, 0.1); color: var(--gold); }
        .status-approved { background: rgba(92, 219, 149, 0.1); color: #5cdb95; }
    </style>
</head>
<body>
    <nav>
        <a class="logo" href="index.html">MARINE<span>FPS</span></a>
        <a href="index.html" style="color:#aaa; text-decoration:none; font-size:13px;">← Back to Home</a>
    </nav>

    <div class="container">
        <div id="profile-ui">
            <p>Loading your profile...</p>
        </div>

        <h3 style="font-family:'Barlow Condensed'; font-size:24px; margin-bottom:20px;">Your Submissions</h3>
        <div id="my-posts"></div>
    </div>

    <script>
        async function init() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }

            const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
            const { data: stats } = await sb.from('user_stats').select('*').eq('user_id', user.id).single();

            document.getElementById('profile-ui').innerHTML = `
                <div class="profile-header">
                    <div style="flex:1">
                        <p style="color:var(--gold); font-size:12px; margin-bottom:5px;">COMMUNITY MEMBER</p>
                        <h1 class="username">${profile.username}</h1>
                    </div>
                    <div class="stat-card">
                        <span class="stat-val">${stats?.total_upvotes || 0}</span>
                        <span class="stat-lab">Total Upvotes</span>
                    </div>
                </div>
            `;
            loadMyPosts(user.id);
        }

        async function loadMyPosts(userId) {
            const { data: posts } = await sb.from('posts').select('*').eq('user_id', userId).order('created_at', { ascending: false });
            
            document.getElementById('my-posts').innerHTML = posts.map(p => `
                <div class="post-list-item">
                    <div>
                        <div style="font-size:11px; color:#666; margin-bottom:5px;">${p.game} // ${p.type}</div>
                        <a href="post.html?id=${p.id}" style="color:#fff; text-decoration:none; font-weight:600; font-size:18px;">${p.title}</a>
                    </div>
                    <div style="text-align:right">
                        <span class="status-badge status-${p.status}">${p.status}</span>
                        <div style="font-size:12px; color:#444; margin-top:8px;">▲ ${p.upvotes} upvotes</div>
                    </div>
                </div>
            `).join('') || '<p style="color:#444">You haven\'t posted anything yet.</p>';
        }
        init();
    </script>
</body>
</html>
