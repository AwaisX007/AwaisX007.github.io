<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post — MarineFPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  :root { --gold: #e8c84a; --bg: #080808; --bg2: #0f0f0f; --bg3: #141414; --border: #222; --border2: #2a2a2a; --text: #e0e0e0; --text-muted: #666; --text-dim: #999; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
  
  /* Navbar */
  nav { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 56px; background: rgba(8,8,8,0.97); border-bottom: 1px solid var(--border); backdrop-filter: blur(8px); }
  .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 2px; text-decoration: none; }
  .logo span { color: #fff; }
  .nav-right { display: flex; gap: 15px; align-items: center; }
  .nav-user { font-size: 13px; color: var(--text-dim); }
  .btn-logout { font-size: 11px; color: var(--text-muted); background: none; border: none; cursor: pointer; text-decoration: underline; }

  /* Main Layout */
  .post-container { max-width: 800px; margin: 60px auto; padding: 0 24px; }
  .post-header { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 30px; }
  .post-category { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
  .post-title { font-family: 'Barlow Condensed', sans-serif; font-size: 56px; font-weight: 700; color: #fff; line-height: 1.0; margin-bottom: 20px; }
  .post-meta { display: flex; align-items: center; gap: 15px; font-size: 14px; color: var(--text-muted); }
  
  /* Body Text Formatting */
  .post-content { font-size: 19px; color: #ccc; white-space: pre-wrap; word-wrap: break-word; }
  .post-content h2 { color: var(--gold); font-family: 'Barlow Condensed', sans-serif; font-size: 32px; margin: 40px 0 15px; border-left: 4px solid var(--gold); padding-left: 15px; }
  .post-content b, .post-content strong { color: #fff; font-weight: 700; }

  /* Interaction Bar */
  .interaction-bar { margin-top: 50px; padding: 30px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 20px; }
  .upvote-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 24px; border-radius: 4px; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; transition: 0.2s; }
  .upvote-btn:hover { background: rgba(232,200,74,0.1); }
  .upvote-btn.active { background: var(--gold); color: #000; }
  .vote-count { font-size: 20px; font-weight: 700; color: #fff; }

  /* Comments */
  .comments-section { margin-top: 60px; }
  .comments-section h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; color: #fff; margin-bottom: 25px; letter-spacing: 1px; }
  .comment-form { background: var(--bg2); padding: 20px; border-radius: 4px; border: 1px solid var(--border); margin-bottom: 40px; }
  .comment-input { width: 100%; height: 100px; background: #000; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 4px; margin-bottom: 12px; font-family: inherit; font-size: 15px; resize: none; }
  .btn-submit { background: var(--gold); color: #000; border: none; padding: 10px 24px; border-radius: 3px; font-weight: 700; cursor: pointer; font-size: 13px; }
  
  .comment-card { background: var(--bg2); border: 1px solid var(--border); padding: 20px; border-radius: 4px; margin-bottom: 15px; position: relative; }
  .comment-author { color: var(--gold); font-size: 13px; font-weight: 700; margin-bottom: 8px; }
  .comment-text { font-size: 15px; color: var(--text-dim); }
  .btn-delete { position: absolute; top: 20px; right: 20px; color: #ff4444; background: none; border: none; cursor: pointer; font-size: 11px; opacity: 0.6; }
  .btn-delete:hover { opacity: 1; }

  footer { border-top: 1px solid var(--border); padding: 40px 32px; background: var(--bg2); margin-top: 100px; text-align: center; font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">MARINE<span>FPS</span></a>
  <div class="nav-right" id="nav-right">
    <a href="login.html" style="color:var(--text-dim); font-size:13px; text-decoration:none;">Log in</a>
  </div>
</nav>

<div id="post-area" class="post-container">
  <div style="text-align:center; padding:100px; color:var(--text-muted);">Loading post...</div>
</div>

<footer>© 2026 MarineFPS — Built for players, by players.</footer>

<script>
  // Global States
  const currentPostId = new URLSearchParams(window.location.search).get('id');
  let currentUser = null;
  let isAdmin = false;
  let hasUpvoted = false;

  async function init() {
    if (!currentPostId) {
      document.getElementById('post-area').innerHTML = "<h2>No post selected.</h2>";
      return;
    }

    // 1. Sync Authentication
    const { data: { user } } = await sb.auth.getUser();
    currentUser = user;

    if (user) {
      const { data: profile } = await sb.from('profiles').select('username, is_admin').eq('id', user.id).single();
      isAdmin = profile?.is_admin || false;
      
      document.getElementById('nav-right').innerHTML = `
        <span class="nav-user">${profile?.username || user.email}</span>
        ${isAdmin ? '<a href="admin.html" style="color:var(--gold); font-size:12px; text-decoration:none;">Admin</a>' : ''}
        <button class="btn-logout" onclick="sb.auth.signOut().then(() => location.reload())">Log out</button>
      `;

      // 2. Check if user already upvoted
      const { data: vote } = await sb.from('post_upvotes').select('*').eq('post_id', currentPostId).eq('user_id', user.id).single();
      hasUpvoted = !!vote;
    }

    loadPostData();
  }

  async function loadPostData() {
    const { data: post, error } = await sb.from('posts').select('*, profiles(username)').eq('id', currentPostId).single();
    
    if (error || !post) {
      document.getElementById('post-area').innerHTML = "<h2>Post not found or pending.</h2>";
      return;
    }

    // 3. Render Post HTML
    document.getElementById('post-area').innerHTML = `
      <article>
        <div class="post-header">
          <div class="post-category">${post.game} // ${post.category}</div>
          <h1 class="post-title">${post.title}</h1>
          <div class="post-meta">
            <span>By <strong>${post.profiles?.username || 'Anonymous'}</strong></span>
            <span>•</span>
            <span>${new Date(post.created_at).toLocaleDateString()}</span>
          </div>
        </div>
        
        <div class="post-content">${formatContent(post.content)}</div>

        <div class="interaction-bar">
          <button id="upvote-btn" class="upvote-btn ${hasUpvoted ? 'active' : ''}" onclick="toggleUpvote()">
            ${hasUpvoted ? '▲ UPVOTED' : '▲ UPVOTE'}
          </button>
          <span class="vote-count" id="v-count">${post.upvotes || 0}</span>
        </div>

        <div class="comments-section">
          <h3>Discussion</h3>
          <div id="comment-form-spot">
            <p style="color:var(--text-muted); font-size:14px;">Sign in to join the conversation.</p>
          </div>
          <div id="comments-list" style="margin-top:30px;"></div>
        </div>
      </article>
    `;

    // 4. Injected Comment Box if logged in
    if (currentUser) {
      document.getElementById('comment-form-spot').innerHTML = `
        <div class="comment-form">
          <textarea id="comm-box" class="comment-input" placeholder="Share your strategy..."></textarea>
          <button onclick="postComment()" class="btn-submit">Post Comment</button>
        </div>
      `;
    }

    loadComments();
  }

  // Formatting Helper (Fixes **bold** and ## headers)
  function formatContent(text) {
    if (!text) return '';
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/^## (.*$)/gim, '<h2>$1</h2>')
      .replace(/\n/g, '<br>');
  }

  // Upvote Logic
  async function toggleUpvote() {
    if (!currentUser) return alert("Log in to upvote!");
    const btn = document.getElementById('upvote-btn');
    btn.disabled = true;

    if (hasUpvoted) {
      await sb.from('post_upvotes').delete().eq('post_id', currentPostId).eq('user_id', currentUser.id);
      hasUpvoted = false;
      await syncVotes(-1);
    } else {
      await sb.from('post_upvotes').insert({ post_id: currentPostId, user_id: currentUser.id });
      hasUpvoted = true;
      await syncVotes(1);
    }
    
    btn.disabled = false;
  }

  async function syncVotes(change) {
    const { data } = await sb.from('posts').select('upvotes').eq('id', currentPostId).single();
    const newVal = (data.upvotes || 0) + change;
    await sb.from('posts').update({ upvotes: newVal }).eq('id', currentPostId);
    
    document.getElementById('v-count').innerText = newVal;
    const btn = document.getElementById('upvote-btn');
    btn.classList.toggle('active');
    btn.innerText = hasUpvoted ? '▲ UPVOTED' : '▲ UPVOTE';
  }

  // Comment Logic
  async function loadComments() {
    const { data: comments } = await sb.from('post_comments').select('*, profiles(username)').eq('post_id', currentPostId).order('created_at', { ascending: false });
    const list = document.getElementById('comments-list');
    
    list.innerHTML = comments?.map(c => `
      <div class="comment-card">
        <div class="comment-author">${c.profiles?.username || 'User'}</div>
        <div class="comment-text">${c.content}</div>
        ${(isAdmin || (currentUser && currentUser.id === c.user_id)) ? 
          `<button class="btn-delete" onclick="deleteComment(${c.id})">Delete</button>` : ''}
      </div>
    `).join('') || '<p style="color:#444">No comments yet.</p>';
  }

  async function postComment() {
    const text = document.getElementById('comm-box').value.trim();
    if (!text) return;
    const { error } = await sb.from('post_comments').insert({ post_id: currentPostId, user_id: currentUser.id, content: text });
    if (!error) { document.getElementById('comm-box').value = ''; loadComments(); }
  }

  async function deleteComment(id) {
    if (confirm("Remove this comment?")) {
      await sb.from('post_comments').delete().eq('id', id);
      loadComments();
    }
  }

  init();
</script>
</body>
</html>
