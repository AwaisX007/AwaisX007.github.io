<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post — MarineFPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  :root { --gold: #e8c84a; --bg: #080808; --bg2: #0f0f0f; --bg3: #141414; --border: #222; --text: #e0e0e0; --text-muted: #666; --text-dim: #999; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
  
  nav { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 56px; background: rgba(8,8,8,0.97); border-bottom: 1px solid var(--border); backdrop-filter: blur(8px); }
  .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 2px; text-decoration: none; }
  .logo span { color: #fff; }
  .nav-right { display: flex; gap: 10px; align-items: center; }

  .post-container { max-width: 800px; margin: 60px auto; padding: 0 24px; }
  .post-header { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 30px; }
  .post-category { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
  .post-title { font-family: 'Barlow Condensed', sans-serif; font-size: 48px; font-weight: 700; color: #fff; line-height: 1.1; margin-bottom: 20px; }
  .post-meta { display: flex; align-items: center; gap: 15px; font-size: 14px; color: var(--text-muted); }
  
  .post-content { font-size: 18px; color: var(--text-dim); white-space: pre-wrap; }
  .post-content h2 { color: #fff; margin: 40px 0 20px; font-family: 'Barlow Condensed', sans-serif; font-size: 28px; border-left: 3px solid var(--gold); padding-left: 15px; }
  
  .error-screen { text-align: center; padding: 100px 24px; }
  .error-screen h2 { color: var(--gold); margin-bottom: 10px; }

  footer { border-top: 1px solid var(--border); padding: 32px; background: var(--bg2); margin-top: 100px; }
  .footer-inner { max-width: 800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
  .btn-logout { font-size: 12px; padding: 6px 14px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); border-radius: 3px; cursor: pointer; }
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">MARINE<span>FPS</span></a>
  <div class="nav-right" id="nav-right">
    <a href="login.html" style="color:var(--text-dim); font-size:13px; text-decoration:none;">Log in</a>
  </div>
</nav>

<div id="content-area">
  <div style="text-align:center; padding:100px; color:var(--text-muted);">Loading post...</div>
</div>

<footer>
  <div class="footer-inner">
    <div class="footer-logo">MARINE<span>FPS</span></div>
    <div style="font-size: 12px; color: var(--text-muted);">© 2025 MarineFPS</div>
  </div>
</footer>

<script>
  async function init() {
    // 1. Sync Auth State
    const { data: { user } } = await sb.auth.getUser();
    if (user) {
      const { data: profile } = await sb.from('profiles').select('username').eq('id', user.id).single();
      document.getElementById('nav-right').innerHTML = `
        <span style="font-size:13px;color:var(--text-dim);margin-right:12px;">${profile?.username || user.email}</span>
        <button class="btn-logout" onclick="sb.auth.signOut().then(() => window.location.reload())">Log out</button>
      `;
    }
    loadPost();
  }

  async function loadPost() {
    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');

    if (!postId) {
      showError("No post ID provided.");
      return;
    }

    // 2. Fetch the post and join with profiles to get the username
    const { data: post, error } = await sb
      .from('posts')
      .select('*, profiles(username)')
      .eq('id', postId)
      .single();

    if (error || !post) {
      console.error("Fetch error:", error);
      showError("Post not found or hasn't been approved yet.");
      return;
    }

    renderPost(post);
  }

  function renderPost(post) {
    const area = document.getElementById('content-area');
    area.innerHTML = `
      <article class="post-container">
        <div class="post-header">
          <div class="post-category">${post.game} // ${post.category}</div>
          <h1 class="post-title">${post.title}</h1>
          <div class="post-meta">
            <span>By <strong>${post.profiles?.username || 'Anonymous'}</strong></span>
            <span>•</span>
            <span>${new Date(post.created_at).toLocaleDateString()}</span>
            <span>•</span>
            <span style="color: var(--gold)">▲ ${post.upvotes || 0} Upvotes</span>
          </div>
        </div>
        <div class="post-content">${formatContent(post.content)}</div>
      </article>
    `;
  }

  function formatContent(text) {
    // Basic Markdown support for ## Headers
    return text.replace(/^## (.*$)/gim, '<h2>$1</h2>');
  }

  function showError(msg) {
    document.getElementById('content-area').innerHTML = `
      <div class="error-screen">
        <h2>Oops!</h2>
        <p style="color: var(--text-muted)">${msg}</p>
        <br>
        <a href="index.html" style="color: var(--gold); text-decoration: none;">← Return Home</a>
      </div>
    `;
  }

  init();
</script>
</body>
</html>
