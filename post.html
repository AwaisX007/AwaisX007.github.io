<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post — MarineFPS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  :root { --gold: #e8c84a; --bg: #080808; --bg2: #0f0f0f; --border: #222; --text: #e0e0e0; --text-muted: #666; }
  body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; margin: 0; }
  nav { display: flex; justify-content: space-between; padding: 0 32px; height: 56px; background: #080808; border-bottom: 1px solid var(--border); align-items: center; }
  .logo { color: var(--gold); text-decoration: none; font-weight: 700; letter-spacing: 2px; }
  .post-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
  
  /* Upvote Section */
  .upvote-bar { display: flex; align-items: center; gap: 15px; margin: 20px 0; padding: 20px 0; border-top: 1px solid var(--border); }
  .btn-upvote { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: 600; }
  .btn-upvote:hover { background: rgba(232,200,74,0.1); }
  .btn-upvote.active { background: var(--gold); color: #000; }

  /* Comment Section */
  .comments-section { margin-top: 60px; border-top: 1px solid var(--border); padding-top: 40px; }
  .comment-input { width: 100%; background: var(--bg2); border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 4px; margin-bottom: 10px; resize: vertical; }
  .comment-card { background: var(--bg2); border: 1px solid var(--border); padding: 15px; border-radius: 4px; margin-bottom: 15px; }
  .comment-author { font-size: 13px; color: var(--gold); margin-bottom: 5px; font-weight: 600; }
  .comment-text { font-size: 15px; color: #ccc; }
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">MARINE<span>FPS</span></a>
  <div id="nav-right"></div>
</nav>

<div class="post-container" id="post-area">
  <div id="content-area">Loading...</div>
  
  <div class="upvote-bar">
    <button id="upvote-btn" class="btn-upvote" onclick="handleUpvote()">▲ Upvote</button>
    <span id="upvote-count" style="font-weight: 700; color: #fff;">0</span>
  </div>

  <div class="comments-section">
    <h3>Discussion</h3>
    <div id="comment-form-area" style="margin-bottom: 30px;">
      <p style="color:var(--text-muted); font-size:14px;">Log in to join the conversation.</p>
    </div>
    <div id="comments-list"></div>
  </div>
</div>

<script>
  let currentPostId = new URLSearchParams(window.location.search).get('id');
  let currentUser = null;

  let isAdmin = false; // Add this global variable at the top

async function init() {
  const { data: { user } } = await sb.auth.getUser();
  currentUser = user;
  if (user) {
    // Fetch both username AND is_admin status
    const { data: profile } = await sb.from('profiles')
      .select('username, is_admin')
      .eq('id', user.id)
      .single();
    
    isAdmin = profile?.is_admin || false;
    // ... rest of your existing nav code ...
  }
  loadPost();
  loadComments();
}

  async function loadPost() {
    const { data: post, error } = await sb.from('posts').select('*, profiles(username)').eq('id', currentPostId).single();
    if (post) {
      document.getElementById('content-area').innerHTML = `<h1>${post.title}</h1><p style="color:#999">By ${post.profiles.username}</p><div style="margin-top:20px">${post.content}</div>`;
      document.getElementById('upvote-count').innerText = post.upvotes || 0;
    }
  }

  async function handleUpvote() {
    if (!currentUser) return alert("Log in to upvote!");
    
    // Simple logic: Increment the number in the database
    const { data: post } = await sb.from('posts').select('upvotes').eq('id', currentPostId).single();
    const newCount = (post.upvotes || 0) + 1;

    const { error } = await sb.from('posts').update({ upvotes: newCount }).eq('id', currentPostId);
    if (!error) {
      document.getElementById('upvote-count').innerText = newCount;
      document.getElementById('upvote-btn').classList.add('active');
      document.getElementById('upvote-btn').disabled = true;
    }
  }

  async function loadComments() {
    const { data: comments } = await sb.from('post_comments').select('*, profiles(username)').eq('post_id', currentPostId).order('created_at', { ascending: false });
    const list = document.getElementById('comments-list');
    list.innerHTML = comments?.length ? comments.map(c => `
      <div class="comment-card">
        <div class="comment-author">${c.profiles?.username || 'User'}</div>
        <div class="comment-text">${c.content}</div>
      </div>
    `).join('') : '<p style="color:#666">No comments yet. Start the conversation!</p>';
  }

  async function postComment() {
    const text = document.getElementById('comment-text').value.trim();
    if (!text) return;
    
    const { error } = await sb.from('post_comments').insert({ post_id: currentPostId, user_id: currentUser.id, content: text });
    if (!error) {
      document.getElementById('comment-text').value = '';
      loadComments();
    }
  }

  init();
</script>
</body>
</html>
