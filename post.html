<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post — MarineoFPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root { --gold: #e8c84a; --bg: #080808; --bg2: #0f0f0f; --border: #222; --text: #e0e0e0; --text-muted: #666; }
        body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        nav { display: flex; justify-content: space-between; padding: 0 32px; height: 56px; background: #080808; border-bottom: 1px solid var(--border); align-items: center; }
        .logo { color: var(--gold); text-decoration: none; font-weight: 700; letter-spacing: 2px; font-family: 'Barlow Condensed'; }
        .post-container { max-width: 800px; margin: 60px auto; padding: 0 24px; }
        .post-title { font-family: 'Barlow Condensed'; font-size: 56px; color: #fff; line-height: 1.1; margin-bottom: 20px; text-transform: uppercase; }
        .post-content { font-size: 19px; color: #ccc; white-space: pre-wrap; margin-bottom: 50px; }
        .post-content b { color: #fff; font-weight: 700; }
        .post-content h2 { color: var(--gold); margin: 30px 0 15px; font-family: 'Barlow Condensed'; }
        .interaction-bar { display: flex; align-items: center; gap: 20px; padding: 30px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .upvote-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 24px; border-radius: 4px; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .upvote-btn.active { background: var(--gold); color: #000; }
        .comment-card { background: var(--bg2); border: 1px solid var(--border); padding: 20px; border-radius: 4px; margin-bottom: 15px; position: relative; }
        .comment-author { color: var(--gold); font-size: 13px; font-weight: 700; margin-bottom: 5px; }
        .btn-delete { position: absolute; top: 15px; right: 15px; color: #ff4444; background: none; border: none; cursor: pointer; font-size: 11px; }
        .comment-input { width: 100%; height: 100px; background: #000; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 4px; margin: 20px 0 10px; }
    </style>
</head>
<body>
    <nav>
        <a class="logo" href="index.html">MARINEO<span>FPS</span></a>
        <div id="nav-right"></div>
    </nav>

    <div id="main-content" class="post-container">
        <p style="text-align:center; padding:100px; color:#555">Loading post content...</p>
    </div>

    <script>
        const postId = new URLSearchParams(window.location.search).get('id');
        let currentUser = null;
        let isAdmin = false;
        let hasUpvoted = false;

        async function init() {
            const { data: { user } } = await sb.auth.getUser();
            currentUser = user;
            if (user) {
                const { data: profile } = await sb.from('profiles').select('username, is_admin').eq('id', user.id).single();
                isAdmin = profile?.is_admin || false;
                document.getElementById('nav-right').innerHTML = `
  <div style="display:flex; align-items:center; gap:12px;">
    <a href="profile.html" style="text-decoration:none; color:inherit;">
      <span style="font-size:13px;color:#999;cursor:pointer;">${profile?.username || user.email}</span>
    </a>
    ${profile?.is_admin ? '<a href="admin.html" style="font-size:12px;color:var(--gold);text-decoration:none;border:1px solid rgba(232,200,74,0.3);padding:5px 10px;border-radius:3px;">Admin</a>' : ''}
    <button class="btn-logout" style="cursor:pointer; background:transparent; border:1px solid #2a2a2a; color:#666; padding:6px 14px; border-radius:3px;" onclick="sb.auth.signOut().then(() => window.location.reload())">Log out</button>
  </div>
`;
                
                const { data: vote } = await sb.from('post_upvotes').select('*').eq('post_id', postId).eq('user_id', user.id).single();
                hasUpvoted = !!vote;
            }
            incrementViews();
            loadPost();
        }

        async function loadPost() {
 const { data: post, error } = await sb.from('posts')
    .select('*, profiles!posts_user_id_fkey(username)')
    .eq('id', postId)
    .single();

    if (error) {
        console.error("Supabase Error:", error); // This will show in your F12 console
        document.getElementById('main-content').innerHTML = `<h2>Post not found.</h2><p>${error.message}</p>`;
        return;
    }

            document.getElementById('main-content').innerHTML = `
                <article>
                    <div style="color:var(--gold); font-weight:700; font-size:12px; letter-spacing:2px; margin-bottom:10px;">${post.game} // ${post.category}</div>
                    <h1 class="post-title">${post.title}</h1>
                    <div style="font-size:14px; color:#666; margin-bottom:40px;">by <b>${post.profiles?.username}</b> • ${timeAgo(post.created_at)} • 👁️ ${post.views || 0} views</div>
                    <div class="post-content">${formatText(post.content)}</div>
                    
                    <div class="interaction-bar">
                        <button id="upvote-btn" class="upvote-btn ${hasUpvoted ? 'active' : ''}" onclick="toggleUpvote()">
                            ${hasUpvoted ? '▲ UPVOTED' : '▲ UPVOTE'}
                        </button>
                        <span style="font-weight:700; color:#fff;" id="v-count">${post.upvotes || 0}</span>
                    </div>

                    <div style="margin-top:60px;">
                        <h3 style="font-family:'Barlow Condensed'; font-size:24px; margin-bottom:30px;">Discussion</h3>
                        <div id="comment-area">${currentUser ? `<textarea id="c-box" class="comment-input" placeholder="Join the discussion..."></textarea><button onclick="postComment()" style="background:var(--gold); color:#000; border:none; padding:10px 20px; font-weight:700; cursor:pointer; border-radius:3px;">Post Comment</button>` : `<p style="color:#666; font-size:14px;">Sign in to join the conversation.</p>`}</div>
                        <div id="comments-list" style="margin-top:40px;"></div>
                    </div>
                </article>
            `;
            loadComments();
        }

        function formatText(t) {
            return t.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/^## (.*$)/gim, '<h2>$1</h2>').replace(/\n/g, '<br>');
        }

        async function toggleUpvote() {
  if (!currentUser) return alert("Log in to upvote!");
  
  const btn = document.getElementById('upvote-btn');
  btn.disabled = true; // Prevent spam-clicking during the sync

  // 1. OPTIMISTIC UI: Change look immediately for a "snappy" feel
  hasUpvoted = !hasUpvoted; 
  btn.classList.toggle('active', hasUpvoted);
  btn.innerText = hasUpvoted ? '▲ UPVOTED' : '▲ UPVOTE';

  // 2. TRIGGER CONFETTI: Only if they are adding an upvote
  if (hasUpvoted) {
    celebrate(); 
  }

  try {
    if (!hasUpvoted) {
      // REMOVE VOTE
      const { error } = await sb.from('post_upvotes')
        .delete()
        .eq('post_id', postId)
        .eq('user_id', currentUser.id);
      
      if (error) throw error;
    } else {
      // ADD VOTE
      const { error } = await sb.from('post_upvotes')
        .insert({ post_id: postId, user_id: currentUser.id });
      
      if (error) throw error;
    }

    // 3. Update the counter from the database
    await refreshUpvoteCount();

  } catch (err) {
    console.error("Upvote failed:", err);
    // Revert UI if the database call actually failed
    hasUpvoted = !hasUpvoted;
    btn.classList.toggle('active', hasUpvoted);
    btn.innerText = hasUpvoted ? '▲ UPVOTED' : '▲ UPVOTE';
    alert("Interaction failed. Please try again.");
  } finally {
    btn.disabled = false; // Re-enable button
  }
}

// Helper function for the confetti burst
function celebrate() {
  confetti({
    particleCount: 100,
    spread: 70,
    origin: { y: 0.9 },
    colors: ['#e8c84a', '#ffffff', '#5cdb95'] // Gold, White, and Green for success
  });
}

async function refreshUpvoteCount() {
  // 1. Get the REAL count of rows in the upvotes table
  const { count, error: countError } = await sb
    .from('post_upvotes')
    .select('*', { count: 'exact', head: true })
    .eq('post_id', postId);

  if (countError) {
    console.error("Count Error:", countError);
    return;
  }

  // 2. Update the main 'posts' table with the exact count
  const { error: updateError } = await sb
    .from('posts')
    .update({ upvotes: count })
    .eq('id', postId);

  if (!updateError) {
    // 3. Update the UI
    document.getElementById('v-count').innerText = count;
    const btn = document.getElementById('upvote-btn');
    btn.classList.toggle('active', hasUpvoted);
    btn.innerText = hasUpvoted ? '▲ UPVOTED' : '▲ UPVOTE';
  }
}

        async function loadComments() {
            const { data: comments } = await sb.from('post_comments').select('*, profiles(username)').eq('post_id', postId).order('created_at', { ascending: false });
            document.getElementById('comments-list').innerHTML = comments?.map(c => `
                <div class="comment-card">
                    <div class="comment-author">${c.profiles?.username}</div>
                    <div style="color:#aaa; font-size:15px;">${c.content}</div>
                    ${(isAdmin || (currentUser && currentUser.id === c.user_id)) ? `<button class="btn-delete" onclick="deleteComment(${c.id})">Delete</button>` : ''}
                </div>
            `).join('') || '<p style="color:#444">No comments yet.</p>';
        }

        async function postComment() {
            const txt = document.getElementById('c-box').value.trim();
            if (!txt) return;
            await sb.from('post_comments').insert({ post_id: postId, user_id: currentUser.id, content: txt });
            document.getElementById('c-box').value = ''; loadComments();
        }

        async function deleteComment(id) {
            if (confirm("Delete comment?")) { await sb.from('post_comments').delete().eq('id', id); loadComments(); }
        }
        async function incrementViews() {
    if (!postId) return;
    const viewKey = `viewed_post_${postId}`;
    if (sessionStorage.getItem(viewKey)) return;
    sessionStorage.setItem(viewKey, 'true');
    const { error } = await sb.rpc('increment_views', { post_id: postId });
    if (error) console.error("Error incrementing views:", error);
}
function timeAgo(date) {
  const seconds = Math.floor((new Date() - new Date(date)) / 1000);
  let interval = Math.floor(seconds / 31536000);
  if (interval >= 1) return interval + "y ago";
  interval = Math.floor(seconds / 2592000);
  if (interval >= 1) return interval + "mo ago";
  interval = Math.floor(seconds / 86400);
  if (interval >= 1) return interval + "d ago";
  interval = Math.floor(seconds / 3600);
  if (interval >= 1) return interval + "h ago";
  interval = Math.floor(seconds / 60);
  if (interval >= 1) return interval + "m ago";
  return "just now";
}
        init();
    </script>
</body>
</html>
