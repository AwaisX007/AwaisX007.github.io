<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — MarineoFPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  :root { --gold: #e8c84a; --bg: #080808; --bg2: #0f0f0f; --bg3: #141414; --bg4: #1a1a1a; --border: #222; --border2: #2a2a2a; --text: #e0e0e0; --text-muted: #666; --text-dim: #999; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
  nav { display: flex; align-items: center; padding: 0 32px; height: 56px; background: rgba(8,8,8,0.97); border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 2px; text-decoration: none; }
  .logo span { color: #fff; }
  .center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
  .card { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 40px; width: 100%; max-width: 420px; }
  .card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .card-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; line-height: 1.6; }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px; }
  input { width: 100%; background: var(--bg4); border: 1px solid var(--border2); color: var(--text); font-family: 'Barlow', sans-serif; font-size: 14px; border-radius: 3px; padding: 11px 14px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: var(--gold); }
  input::placeholder { color: var(--text-muted); }
  .submit-btn { width: 100%; padding: 12px; background: var(--gold); color: #080808; font-weight: 700; font-size: 14px; border: none; border-radius: 3px; cursor: pointer; font-family: 'Barlow', sans-serif; margin-top: 8px; transition: background 0.2s; }
  .submit-btn:hover { background: #f0d060; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg { padding: 12px 14px; border-radius: 3px; font-size: 13px; margin-bottom: 18px; display: none; }
  .msg.error { background: rgba(220,50,50,0.1); border: 1px solid rgba(220,50,50,0.3); color: #ff6b6b; display: block; }
  .msg.success { background: rgba(50,200,100,0.1); border: 1px solid rgba(50,200,100,0.3); color: #5cdb95; display: block; }
  .switch { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
  .switch a { color: var(--gold); text-decoration: none; }
  .captcha-wrap { margin-top: 14px; }
  footer { border-top: 1px solid var(--border); padding: 24px 32px; background: var(--bg2); margin-top: auto; }
  footer a { transition: opacity 0.2s ease, text-decoration-color 0.2s ease; }
  footer a:hover { opacity: 0.92; text-decoration: underline !important; }
  .footer-inner { max-width: 420px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
  .footer-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: var(--gold); }
  .footer-logo span { color: #555; }
  .footer-text { font-size: 12px; color: var(--text-muted); }
  .footer-links { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
</style>
</head>
<body>
<nav><a class="logo" href="index.html">MARINEO<span>FPS</span></a></nav>
<div class="center">
  <div class="card">
    <div class="card-title">Forgot Password</div>
    <div class="card-sub">Enter your email and we'll send you a link to reset your password.</div>
    <div class="msg" id="msg"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com">
    </div>
    <div id="captcha-wrap" class="captcha-wrap" style="display:none;"></div>
    <button class="submit-btn" id="submit-btn" onclick="handleReset()">Send Reset Link</button>
    <div class="switch"><a href="login.html">← Back to login</a></div>
  </div>
</div>
<footer data-footer-links="support,discord" data-footer-justify="center">
  <div class="footer-inner">
    <div class="footer-logo">MARINEO<span>FPS</span></div>
    <div class="footer-links"></div>
    <div class="footer-text">© 2026 MarineoFPS. Built for players, by players.</div>
  </div>
</footer>
<script src="footer.js"></script>
<script>
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let captchaToken = null;
  let captchaWidgetId = null;

  window.onCaptchaVerified = function(token) {
    captchaToken = token;
  };

  function getCaptchaProvider() {
    const provider = (typeof CAPTCHA_PROVIDER === 'string' ? CAPTCHA_PROVIDER.trim().toLowerCase() : '');
    return provider === 'turnstile' ? 'turnstile' : 'hcaptcha';
  }

  function loadCaptchaScript(provider) {
    return new Promise((resolve, reject) => {
      const existing = document.querySelector(`script[data-captcha-provider="${provider}"]`);
      if (existing) {
        if ((provider === 'hcaptcha' && window.hcaptcha) || (provider === 'turnstile' && window.turnstile)) {
          resolve();
        } else {
          existing.addEventListener('load', () => resolve(), { once: true });
          existing.addEventListener('error', () => reject(new Error('Failed to load CAPTCHA script')), { once: true });
        }
        return;
      }

      const script = document.createElement('script');
      script.async = true;
      script.defer = true;
      script.dataset.captchaProvider = provider;
      script.src = provider === 'turnstile'
        ? 'https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit'
        : 'https://js.hcaptcha.com/1/api.js';
      script.onload = () => resolve();
      script.onerror = () => reject(new Error('Failed to load CAPTCHA script'));
      document.head.appendChild(script);
    });
  }

  async function initCaptchaIfConfigured() {
    const siteKey = (typeof CAPTCHA_SITE_KEY === 'string' ? CAPTCHA_SITE_KEY.trim() : '');
    if (!siteKey) return;

    const provider = getCaptchaProvider();
    try {
      await loadCaptchaScript(provider);
    } catch {
      return;
    }

    const wrap = document.getElementById('captcha-wrap');
    wrap.style.display = 'block';

    if (provider === 'turnstile' && window.turnstile) {
      captchaWidgetId = window.turnstile.render('#captcha-wrap', {
        sitekey: siteKey,
        callback: window.onCaptchaVerified
      });
    } else if (provider === 'hcaptcha' && window.hcaptcha) {
      captchaWidgetId = window.hcaptcha.render('captcha-wrap', {
        sitekey: siteKey,
        callback: 'onCaptchaVerified'
      });
    }
  }

  function resetCaptcha() {
    captchaToken = null;
    const provider = getCaptchaProvider();
    if (captchaWidgetId === null) return;

    if (provider === 'turnstile' && window.turnstile) {
      window.turnstile.reset(captchaWidgetId);
    } else if (provider === 'hcaptcha' && window.hcaptcha) {
      window.hcaptcha.reset(captchaWidgetId);
    }
  }

  async function handleReset() {
    const email = document.getElementById('email').value.trim();
    const btn = document.getElementById('submit-btn');
    const msg = document.getElementById('msg');
    msg.className = 'msg';

    if (!email) {
      msg.className = 'msg error'; msg.textContent = 'Please enter your email.'; return;
    }

    const siteKey = (typeof CAPTCHA_SITE_KEY === 'string' ? CAPTCHA_SITE_KEY.trim() : '');
    if (siteKey && !captchaToken) {
      msg.className = 'msg error';
      msg.textContent = 'Please complete the CAPTCHA first.';
      return;
    }

    btn.disabled = true; btn.textContent = 'Sending...';

    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://marineofps.dev/reset-password.html',
      ...(captchaToken ? { captchaToken } : {})
    });

    if (error) {
      const isCaptchaError = /captcha/i.test(error.message || '');
      msg.className = 'msg error';
      msg.textContent = isCaptchaError
        ? 'CAPTCHA verification failed. Complete CAPTCHA and try again. If no CAPTCHA is visible, set CAPTCHA_SITE_KEY in config.js or disable CAPTCHA protection in Supabase Auth settings.'
        : error.message;
      resetCaptcha();
      btn.disabled = false; btn.textContent = 'Send Reset Link'; return;
    }

    msg.className = 'msg success';
    msg.textContent = 'Reset link sent! Check your email inbox.';
    btn.textContent = 'Email Sent!';
    resetCaptcha();
  }

  window.addEventListener('load', () => {
    setTimeout(initCaptchaIfConfigured, 250);
  });

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleReset(); });
</script>
</body>
</html>
