<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>User Profile — MarineoFPS</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --gold: #e8c84a; --bg: #080808; --bg2: #0f0f0f; --bg3: #141414; --bg4: #1a1a1a; --border: #222; --border2: #2a2a2a; --text: #e0e0e0; --text-muted: #666; --text-dim: #999; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); }
    nav { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 56px; background: rgba(8,8,8,0.97); border-bottom: 1px solid var(--border); backdrop-filter: blur(8px); }
    .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 2px; text-decoration: none; }
    .logo span { color: #fff; }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a { font-size: 13px; font-weight: 500; color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--gold); }

    .page { min-height: calc(100vh - 56px); display: grid; place-items: center; padding: 32px 16px 48px; }
    .splash-card { width: 100%; max-width: 760px; background: radial-gradient(circle at top left, rgba(232,200,74,0.11), rgba(232,200,74,0.03) 42%, rgba(15,15,15,0.98) 100%); border: 1px solid rgba(232,200,74,0.15); border-radius: 24px; padding: 32px; box-shadow: 0 30px 80px rgba(0,0,0,0.3); position: relative; overflow: hidden; }
    .splash-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(115deg, rgba(255,255,255,0.04), transparent 34%, rgba(255,255,255,0.02)); pointer-events: none; }
    .splash-inner { position: relative; z-index: 1; display: flex; align-items: center; gap: 22px; flex-wrap: wrap; }
    .splash-avatar { width: 92px; height: 92px; border-radius: 50%; border: 2px solid rgba(232,200,74,0.35); background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)); color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 34px; font-family: 'Barlow Condensed'; font-weight: 700; box-shadow: 0 0 0 4px rgba(232,200,74,0.06); }
    .splash-copy { flex: 1; min-width: 240px; }
    .splash-kicker { font-size: 11px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; }
    .splash-title { font-family: 'Barlow Condensed', sans-serif; font-size: 44px; color: #fff; line-height: 1; margin-bottom: 10px; }
    .splash-text { font-size: 14px; color: var(--text-dim); line-height: 1.65; max-width: 52ch; }
    .splash-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
    .meta-pill { display: inline-flex; align-items: center; gap: 7px; padding: 8px 12px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); color: var(--text-dim); font-size: 12px; }
    .meta-pill strong { color: #fff; }
    .meta-pill.badge { border-color: rgba(232,200,74,0.28); background: rgba(232,200,74,0.08); color: var(--gold); }
    .splash-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
    .action-link { display: inline-flex; align-items: center; justify-content: center; padding: 11px 16px; border-radius: 999px; text-decoration: none; font-weight: 700; font-size: 13px; transition: transform 0.2s, opacity 0.2s; }
    .action-link:hover { transform: translateY(-1px); }
    .action-primary { background: linear-gradient(180deg, var(--gold), #d5b43e); color: #080808; box-shadow: 0 10px 24px rgba(232,200,74,0.18); }
    .action-secondary { border: 1px solid rgba(255,255,255,0.1); color: var(--text); background: rgba(255,255,255,0.03); }
    .loading-bar { margin-top: 20px; width: 100%; height: 3px; border-radius: 999px; background: rgba(255,255,255,0.05); overflow: hidden; }
    .loading-bar span { display: block; width: 36%; height: 100%; background: linear-gradient(90deg, transparent, var(--gold), transparent); animation: sweep 1.15s infinite; }
    @keyframes sweep { from { transform: translateX(-120%); } to { transform: translateX(320%); } }
    
    .content { max-width: 1000px; margin: 40px auto; padding: 0 32px; }
    .section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; color: #fff; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 24px; text-transform: uppercase; }
    
    .posts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
    .post-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; text-decoration: none; transition: border-color 0.2s, transform 0.2s; min-width: 0; }
    .post-card:hover { border-color: var(--gold); transform: translateY(-2px); }
    .post-meta { font-size: 10px; color: var(--gold); text-transform: uppercase; margin-bottom: 8px; font-weight: 600; letter-spacing: 1px; }
    .post-title { font-size: 16px; color: #fff; font-weight: 600; margin-bottom: 16px; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; line-clamp: 3; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
    .post-stats { display: flex; gap: 12px; font-size: 12px; color: var(--text-muted); border-top: 1px solid var(--border2); padding-top: 12px; }
    
    .empty { text-align: center; padding: 40px; color: var(--text-muted); background: var(--bg2); border: 1px dashed var(--border2); border-radius: 6px; }
    @media (max-width: 700px) { nav { padding: 0 16px; } .nav-links { display: none; } .page { padding-top: 20px; } .splash-card { padding: 24px; } .splash-title { font-size: 34px; } .splash-avatar { width: 76px; height: 76px; font-size: 28px; } }
    @media (max-width: 520px) { .nav-links { display: none; } .nav-spacer { display: none; } }
  </style>
</head>
<body>
<nav>
  <a class="logo" href="index.html">MARINEO<span>FPS</span></a>
  <div class="nav-links">
    <a href="guides.html">Guides</a>
    <a href="blog.html">Blog</a>
    <a href="about.html">About Us</a>
  </div>
  <div class="nav-spacer" style="width: 100px;"></div>
</nav>

<main class="page">
  <section class="splash-card" aria-live="polite">
    <div class="splash-inner">
      <div class="splash-avatar" id="user-avatar">?</div>
      <div class="splash-copy">
        <div class="splash-kicker" id="user-kicker">Public Profile</div>
        <div class="splash-title" id="user-name">Loading...</div>
        <div class="splash-text" id="user-subtitle">Opening the profile and preparing the identity card.</div>
        <div class="splash-meta" id="user-badges"></div>
        <div class="splash-actions">
          <a class="action-link action-primary" id="open-profile-link" href="profile.html">Open profile</a>
          <a class="action-link action-secondary" href="index.html">Back home</a>
        </div>
        <div class="loading-bar"><span></span></div>
      </div>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function safeParam(value) {
    return encodeURIComponent(String(value ?? ''));
  }
  
  // Get the user ID from the URL (e.g., user.html?id=12345)
  const params = new URLSearchParams(window.location.search);
  const userId = params.get('id');

  const redirectTarget = userId ? `profile.html?id=${safeParam(userId)}` : 'profile.html';
  document.getElementById('open-profile-link').href = redirectTarget;
  document.getElementById('user-subtitle').textContent = userId
    ? 'Loading the public profile card before redirecting.'
    : 'No profile id was supplied, so we will open the profile directory.';
  document.getElementById('user-badges').innerHTML = userId
    ? `<span class="meta-pill badge">↗ Public view</span><span class="meta-pill">${escapeHtml(userId.slice(0, 8))}…</span>`
    : `<span class="meta-pill badge">↗ Public view</span><span class="meta-pill">MarineoFPS</span>`;

  async function loadUserProfile() {
    if (!userId) {
      document.getElementById('user-kicker').innerText = 'Profile directory';
      document.getElementById('user-name').innerText = "Open Profile";
      document.getElementById('user-avatar').innerText = 'M';
      setTimeout(() => window.location.replace(redirectTarget), 900);
      return;
    }

    // 1. Fetch User Profile Data
    const { data: profile, error: profileErr } = await sb.from('profiles').select('*').eq('id', userId).single();
    
    if (profileErr || !profile) {
      document.getElementById('user-kicker').innerText = 'Profile not found';
      document.getElementById('user-name').innerText = "Unknown Player";
      document.getElementById('user-subtitle').innerText = 'The public profile could not be loaded, but the site will still open the main profile area.';
      setTimeout(() => window.location.replace(redirectTarget), 900);
      return;
    }

    // Update UI with user info
    document.getElementById('user-name').innerText = profile.username || "Unknown User";
    document.getElementById('user-avatar').innerText = (profile.username || "?").charAt(0).toUpperCase();
    document.getElementById('user-kicker').innerText = profile.is_admin ? 'MarineoFPS staff' : 'Community profile';
    document.getElementById('user-subtitle').innerText = profile.bio ? profile.bio : 'Clean public identity card with posts, activity, and badges.';
    
    if (profile.is_admin) {
      document.getElementById('user-badges').innerHTML = `<span class="meta-pill badge">⭐ Staff</span><span class="meta-pill">Verified public identity</span>`;
    } else {
      document.getElementById('user-badges').innerHTML = `<span class="meta-pill badge">✦ Member</span><span class="meta-pill">Public identity</span>`;
    }

    setTimeout(() => window.location.replace(redirectTarget), 900);

    // Redirect after the branded preview renders.
  }

  loadUserProfile();
</script>
</body>
</html>
