<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallpaper — MarineoFPS</title>
  <meta name="description" content="View and download this 3D render or wallpaper on MarineoFPS.">
  <meta property="og:title" content="Wallpaper — MarineoFPS">
  <meta property="og:description" content="View and download this 3D render or wallpaper on MarineoFPS.">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="MarineoFPS">
  <meta property="og:image" content="https://marineofps.dev/1.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Wallpaper — MarineoFPS">
  <meta name="twitter:description" content="View and download this 3D render or wallpaper on MarineoFPS.">
  <meta name="twitter:image" content="https://marineofps.dev/1.jpg">
  <link rel="icon" type="image/svg+xml" sizes="any" href="/favicon.svg">
  <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    :root { --gold: #e8c84a; --bg: #080808; --bg2: #0f0f0f; --bg3: #141414; --bg4: #1a1a1a; --border: #222; --border2: #2a2a2a; --text: #e0e0e0; --text-muted: #666; --text-dim: #999; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    nav { min-height: 56px; }
    .page { max-width: 1120px; width: 100%; margin: 0 auto; padding: 28px 32px 40px; flex: 1; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-muted); text-decoration: none; font-size: 13px; margin-bottom: 16px; }
    .back-link:hover { color: var(--gold); }
    .detail { display: grid; grid-template-columns: minmax(0, 1fr) 340px; gap: 20px; align-items: start; }
    .main-card { background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; overflow: hidden; box-shadow: 0 18px 36px rgba(0,0,0,0.22); }
    .media { width: 100%; aspect-ratio: 1 / 1; background: #0b0b0b; display: flex; align-items: center; justify-content: center; overflow: auto; }
    .media img { width: auto; height: auto; max-width: none; max-height: none; display: block; transform-origin: center center; }
    .body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .eyebrow { font-size: 10px; color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px; }
    .title { font-family: 'Barlow Condensed', sans-serif; font-size: 40px; color: #fff; line-height: 1; }
    .meta { display: flex; flex-wrap: wrap; gap: 12px; color: var(--text-muted); font-size: 13px; align-items: center; }
    .meta a { color: var(--gold); text-decoration: none; }
    .desc { color: var(--text-dim); line-height: 1.7; font-size: 14px; white-space: pre-wrap; overflow-wrap: anywhere; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .upvote-btn { background: linear-gradient(180deg, var(--gold), #d5b43e); color: #080808; border: none; border-radius: 999px; padding: 10px 16px; font-weight: 800; cursor: pointer; font-size: 13px; box-shadow: 0 10px 24px rgba(232,200,74,0.14); }
    .upvote-btn:disabled { opacity: 0.65; cursor: not-allowed; }
    .download-btn, .zoom-btn { display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; padding: 10px 14px; font-weight: 800; font-size: 13px; text-decoration: none; cursor: pointer; }
    .download-btn { background: transparent; border: 1px solid rgba(232, 200, 74, 0.35); color: var(--gold); }
    .zoom-btn { background: rgba(232, 200, 74, 0.08); border: 1px solid rgba(232, 200, 74, 0.2); color: var(--gold); }
    .zoom-group { display: inline-flex; gap: 8px; flex-wrap: wrap; }
    .count-pill { display: inline-flex; align-items: center; gap: 6px; padding: 9px 12px; border-radius: 999px; border: 1px solid rgba(232, 200, 74, 0.2); color: var(--text-muted); background: rgba(232, 200, 74, 0.05); font-size: 13px; }
    .sidebar { display: flex; flex-direction: column; gap: 14px; }
    .panel { background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 16px; box-shadow: 0 14px 28px rgba(0,0,0,0.14); }
    .panel-title { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; }
    .comment-form textarea { width: 100%; min-height: 110px; resize: vertical; background: #101010; border: 1px solid var(--border2); color: var(--text); border-radius: 10px; padding: 11px 12px; font-family: 'Barlow', sans-serif; outline: none; }
    .comment-form textarea:focus { border-color: var(--gold); }
    .comment-submit { margin-top: 10px; background: linear-gradient(180deg, var(--gold), #d5b43e); color: #080808; border: none; border-radius: 999px; padding: 10px 14px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 24px rgba(232,200,74,0.14); }
    .comment-submit:disabled { opacity: 0.65; cursor: not-allowed; }
    .msg { margin-top: 10px; font-size: 13px; color: var(--text-muted); }
    .msg.error { color: #ff6b6b; }
    .comments { display: flex; flex-direction: column; gap: 10px; }
    .comment { border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); padding: 12px; box-shadow: 0 12px 26px rgba(0,0,0,0.16); }
    .comment.reply { margin-left: 20px; border-left: 3px solid rgba(232,200,74,0.3); background: rgba(232,200,74,0.03); }
    .comment.deleted { opacity: 0.45; }
    .comment-head { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .comment-user { color: var(--gold); font-size: 13px; font-weight: 700; }
    .comment-user a { color: inherit; text-decoration: none; }
    .comment-date { font-size: 11px; color: var(--text-muted); }
    .comment-body { color: var(--text-dim); font-size: 13px; line-height: 1.55; overflow-wrap: anywhere; }
    .comment-body .mention { color: var(--gold); font-weight: 600; }
    .comment-edited { font-size: 11px; color: #555; margin-top: 3px; }
    .comment-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .btn-ca { background: none; border: 1px solid var(--border2); color: var(--text-muted); cursor: pointer; font-size: 11px; padding: 3px 8px; border-radius: 999px; font-family: 'Barlow', sans-serif; }
    .btn-ca:hover { border-color: var(--gold); color: var(--gold); }
    .btn-ca.danger:hover { border-color: #ff4444; color: #ff4444; }
    .inline-box { width: 100%; min-height: 70px; resize: vertical; background: #0a0a0a; border: 1px solid rgba(232,200,74,0.35); color: var(--text); border-radius: 10px; padding: 8px 10px; font-family: 'Barlow', sans-serif; font-size: 13px; outline: none; margin-top: 8px; }
    .reply-thread { margin-top: 8px; display: flex; flex-direction: column; gap: 8px; }
    .empty { background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.01)); border: 1px dashed rgba(255,255,255,0.12); border-radius: 16px; padding: 52px 20px; text-align: center; color: var(--text-dim); }
    footer { border-top: 1px solid var(--border); padding: 24px 32px; background: var(--bg2); }
    .footer-inner { max-width: 1120px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .footer-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: var(--gold); }
    .footer-logo span { color: #555; }
    .footer-text { font-size: 12px; color: var(--text-muted); }
    @media (max-width: 980px) { .detail { grid-template-columns: 1fr; } }
    @media (max-width: 750px) { .page { padding: 24px 16px 40px; } .title { font-size: 32px; } .footer-inner { flex-wrap: wrap; gap: 12px; justify-content: center; text-align: center; } }
  </style>
</head>
<body>
  <nav>
    <a class="logo" href="index.html">MARINEO<span>FPS</span></a>
  </nav>

  <div class="page" id="page">
    <div class="empty">Loading wallpaper...</div>
  </div>

  <footer data-footer-links="support,discord" data-footer-justify="center">
    <div class="footer-inner">
      <div class="footer-logo">MARINEO<span>FPS</span></div>
      <div class="footer-links"></div>
      <div class="footer-text">© 2026 MarineoFPS. Built for players, by players.</div>
    </div>
  </footer>

  <script src="footer.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const renderId = params.get('id');
    let currentUpload = null;
    let currentUser = null;
    let hasUpvoted = false;
    let currentZoom = 1;
    let upvoteChannel = null;
    let commentChannel = null;

    function getDownloadName(url, title) {
      try {
        const path = new URL(url).pathname;
        const name = path.split('/').pop();
        if (name && name.includes('.')) return name;
      } catch {}
      return `${String(title || 'wallpaper').trim().replace(/[^a-zA-Z0-9._-]+/g, '_') || 'wallpaper'}.jpg`;
    }

    function escapeHtml(text) {
      return String(text ?? '').replace(/[&<>\"]/g, (character) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[character]));
    }

    function safeParam(value) {
      return encodeURIComponent(String(value ?? ''));
    }

    function isImageResource(url) {
      if (!url) return false;
      const value = String(url).toLowerCase().split('?')[0].split('#')[0];
      return /\.(png|jpe?g|webp|gif|avif|bmp|svg)$/.test(value) || value.startsWith('data:image/');
    }

    function timeAgo(date) {
      const seconds = Math.floor((new Date() - new Date(date)) / 1000);
      if (seconds < 60) return 'just now';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      if (days < 30) return `${days}d ago`;
      const months = Math.floor(days / 30);
      if (months < 12) return `${months}mo ago`;
      return `${Math.floor(months / 12)}y ago`;
    }

    async function init() {
      const user = window.authUtils?.getCurrentUser ? await window.authUtils.getCurrentUser() : (await window.sb.auth.getUser()).data?.user || null;
      currentUser = user || null;

      if (!renderId) {
        document.getElementById('page').innerHTML = '<div class="empty">Wallpaper not found.</div>';
        return;
      }

      await loadDetail(renderId);
    }

    async function loadDetail(id) {
      const page = document.getElementById('page');
      const { data: upload, error } = await window.sb
        .from('renders_wallpapers')
        .select('id, user_id, title, content, resource_link, created_at, upvotes, views, profiles(username, avatar_url)')
        .eq('id', id)
        .eq('status', 'approved')
        .single();

      if (error || !upload) {
        page.innerHTML = `
          <div class="empty">
            <div style="font-size:34px;opacity:.35;margin-bottom:10px;">🖼️</div>
            <div style="font-size:20px;font-family:'Barlow Condensed',sans-serif;margin-bottom:6px;">Wallpaper not found</div>
            <div style="color:var(--text-muted);font-size:14px;">Return to the collection and choose another render.</div>
            <div style="margin-top:14px;"><a href="renders-wallpapers.html" style="color:var(--gold);text-decoration:none;">Back to collection</a></div>
          </div>`;
        return;
      }

      currentUpload = upload;
      currentZoom = 1;
      setupRealtimeSync(upload.id);

      // Dynamic SEO
      const seoTitle = `${upload.title || 'Wallpaper'} — MarineoFPS`;
      const seoDesc = `${upload.content ? upload.content.substring(0, 120) + '...' : 'View and download this 3D render or wallpaper on MarineoFPS.'}`;
      const seoImg = upload.resource_link || 'https://marineofps.dev/1.jpg';
      document.title = seoTitle;
      document.querySelector('meta[name="description"]')?.setAttribute('content', seoDesc);
      document.querySelector('meta[property="og:title"]')?.setAttribute('content', seoTitle);
      document.querySelector('meta[property="og:description"]')?.setAttribute('content', seoDesc);
      document.querySelector('meta[property="og:image"]')?.setAttribute('content', seoImg);
      document.querySelector('meta[name="twitter:title"]')?.setAttribute('content', seoTitle);
      document.querySelector('meta[name="twitter:description"]')?.setAttribute('content', seoDesc);
      document.querySelector('meta[name="twitter:image"]')?.setAttribute('content', seoImg);

      await syncUpvoteState(upload.id);

      const imageMarkup = isImageResource(upload.resource_link)
        ? `<img id="wallpaper-image" src="${escapeHtml(upload.resource_link)}" alt="${escapeHtml(upload.title)}" loading="eager" decoding="async">`
        : `<div class="empty" style="height:100%;display:flex;align-items:center;justify-content:center;">No image preview available.</div>`;

      page.innerHTML = `
        <a href="renders-wallpapers.html" class="back-link">← Back to wallpapers</a>
        <div class="detail">
          <div class="main-card">
            <div class="media">${imageMarkup}</div>
            <div class="body">
              <div>
                <div class="eyebrow">3D Renders/Wallpapers</div>
                <div class="title">${escapeHtml(upload.title)}</div>
              </div>
              <div class="meta">
                <span>by <a href="profile.html?id=${safeParam(upload.user_id)}">${escapeHtml(upload.profiles?.username || 'unknown')}</a></span>
                <span>·</span>
                <span>${timeAgo(upload.created_at)}</span>
              </div>
              <div class="desc">${escapeHtml(upload.content || '')}</div>
              <div class="actions">
                <button class="upvote-btn ${hasUpvoted ? 'active' : ''}" id="upvote-btn" onclick="toggleRenderUpvote()">${hasUpvoted ? '▲ Remove Upvote' : '▲ Upvote'}</button>
                <a class="download-btn" href="${escapeHtml(upload.resource_link || '#')}" download="${escapeHtml(getDownloadName(upload.resource_link || '', upload.title))}" target="_blank" rel="noopener noreferrer">⇩ Download</a>
                <button class="download-btn" onclick="window.contentUtils.share(window.location.href,'${escapeHtml(upload.title).replace(/'/g,"\\'")}')">⬆ Share</button>
                <div class="count-pill">▲ <span id="upvote-count">${upload.upvotes || 0}</span></div>
                <div class="count-pill">👁️ <span id="view-count">${upload.views || 0}</span></div>
                ${isImageResource(upload.resource_link) ? `<div class="zoom-group"><button class="zoom-btn" type="button" onclick="zoomWallpaper(-0.15)">− Zoom</button><button class="zoom-btn" type="button" onclick="resetWallpaperZoom()">Reset</button><button class="zoom-btn" type="button" onclick="zoomWallpaper(0.15)">+ Zoom</button></div>` : ''}
              </div>
            </div>
          </div>
          <aside class="sidebar">
            <div class="panel">
              <div class="panel-title">Add Comment</div>
              <div class="comment-form">
                <textarea id="comment-box" placeholder="Share your thoughts on this wallpaper..."></textarea>
                <button class="comment-submit" id="comment-submit" onclick="postComment()">Post Comment</button>
                <div class="msg" id="comment-msg"></div>
              </div>
            </div>
            <div class="panel">
              <div class="panel-title">Comments</div>
              <div class="comments" id="comment-list"><div class="msg" style="display:block; margin:0;">Loading comments...</div></div>
            </div>
          </aside>
        </div>`;

      await incrementViewsOnce(upload.id);
      await loadComments(upload.id);
    }

    function setupRealtimeSync(id) {
      window.realtimeUtils.unsubscribe(upvoteChannel);
      window.realtimeUtils.unsubscribe(commentChannel);

      upvoteChannel = window.realtimeUtils.subscribe({
        table: 'renders_wallpaper_upvotes',
        filter: `render_id=eq.${id}`,
        onChange: () => syncUpvoteState(id),
        channelName: `rt_render_upvotes_${id}`
      });

      commentChannel = window.realtimeUtils.subscribe({
        table: 'renders_wallpaper_comments',
        filter: `render_id=eq.${id}`,
        onChange: () => loadComments(id),
        channelName: `rt_render_comments_${id}`
      });
    }

    async function incrementViewsOnce(id) {
      const viewKey = `render_viewed_${id}`;
      if (sessionStorage.getItem(viewKey)) return;
      sessionStorage.setItem(viewKey, 'true');
      const nextViews = (currentUpload?.views || 0) + 1;
      await window.sb.from('renders_wallpapers').update({ views: nextViews }).eq('id', id);
      currentUpload.views = nextViews;
      const viewCount = document.getElementById('view-count');
      if (viewCount) viewCount.textContent = String(nextViews);
    }

    async function syncUpvoteState(id) {
      const button = document.getElementById('upvote-btn');
      const countElement = document.getElementById('upvote-count');

      const countResponse = await window.sb
        .from('renders_wallpaper_upvotes')
        .select('*', { count: 'exact', head: true })
        .eq('render_id', id);

      const count = countResponse.count ?? 0;
      if (countElement) countElement.textContent = String(count);
      currentUpload.upvotes = count;

      if (currentUser) {
        const { data } = await window.sb
          .from('renders_wallpaper_upvotes')
          .select('id')
          .eq('render_id', id)
          .eq('user_id', currentUser.id)
          .maybeSingle();
        hasUpvoted = !!data;
      } else {
        hasUpvoted = false;
      }

      if (button) {
        button.classList.toggle('active', hasUpvoted);
        button.textContent = hasUpvoted ? '▲ Remove Upvote' : '▲ Upvote';
      }
    }

    async function toggleRenderUpvote() {
      if (!currentUpload) return;
      if (!currentUser) { window.location.href = 'login.html'; return; }
      const btn = document.getElementById('upvote-btn');
      btn.disabled = true;
      try {
        if (hasUpvoted) {
          const { error } = await window.sb
            .from('renders_wallpaper_upvotes')
            .delete()
            .eq('render_id', currentUpload.id)
            .eq('user_id', currentUser.id);
          if (error) throw error;
          hasUpvoted = false;
          window.toastUtils.info('Upvote removed.');
        } else {
          const { error } = await window.sb.from('renders_wallpaper_upvotes').insert({
            render_id: currentUpload.id,
            user_id: currentUser.id
          });
          if (error) throw error;
          hasUpvoted = true;
          window.toastUtils.success('▲ Upvoted!');
        }

        await syncUpvoteState(currentUpload.id);
      } catch (error) {
        console.error('Wallpaper upvote error:', error);
      } finally {
        btn.disabled = false;
      }
    }

    function applyWallpaperZoom() {
      const image = document.getElementById('wallpaper-image');
      if (!image) return;
      image.style.transform = `scale(${currentZoom})`;
    }

    function zoomWallpaper(delta) {
      currentZoom = Math.min(4, Math.max(0.5, +(currentZoom + delta).toFixed(2)));
      applyWallpaperZoom();
    }

    function resetWallpaperZoom() {
      currentZoom = 1;
      applyWallpaperZoom();
    }

    async function loadComments(renderIdValue) {
      const list = document.getElementById('comment-list');
      const { data: roots } = await window.sb
        .from('renders_wallpaper_comments')
        .select('id, user_id, content, created_at, edited_at, deleted_at, profiles(username)')
        .eq('render_id', renderIdValue)
        .is('parent_id', null)
        .order('created_at', { ascending: true });

      const { data: replies } = await window.sb
        .from('renders_wallpaper_comments')
        .select('id, user_id, content, created_at, edited_at, deleted_at, parent_id, profiles(username)')
        .eq('render_id', renderIdValue)
        .not('parent_id', 'is', null)
        .order('created_at', { ascending: true });

      const replyMap = {};
      (replies || []).forEach(r => { if (!replyMap[r.parent_id]) replyMap[r.parent_id] = []; replyMap[r.parent_id].push(r); });

      const user = currentUser;
      const profile = user ? await window.authUtils.getProfile(user.id, 'is_admin') : null;

      const renderComment = (c, isReply = false) => {
        const isDeleted = !!c.deleted_at;
        const canEdit = user && user.id === c.user_id && !isDeleted && (Date.now() - new Date(c.created_at).getTime()) < 5 * 60 * 1000;
        const canDelete = !isDeleted && (profile?.is_admin || (user && user.id === c.user_id));
        const bodyHtml = isDeleted ? '<em style="color:#555;">[deleted]</em>' : highlightMentions(escapeHtml(c.content));
        return `
          <div class="comment ${isReply ? 'reply' : ''} ${isDeleted ? 'deleted' : ''}" id="rc-${c.id}">
            <div class="comment-head">
              <div class="comment-user">${isDeleted ? '<span style="color:#555;">deleted</span>' : `<a href="profile.html?id=${safeParam(c.user_id)}" style="color:inherit;text-decoration:none;">${escapeHtml(c.profiles?.username || 'Unknown')}</a>`}</div>
              <div class="comment-date">${timeAgo(c.created_at)}</div>
            </div>
            <div class="comment-body">${bodyHtml}</div>
            ${c.edited_at ? `<div class="comment-edited">edited ${timeAgo(c.edited_at)}</div>` : ''}
            ${!isDeleted ? `<div class="comment-actions">
              ${user ? `<button class="btn-ca" onclick="startRenderReply(${c.id},'${escapeHtml(c.profiles?.username||'').replace(/'/g,"\\'")}')">↩ Reply</button>` : ''}
              ${canEdit ? `<button class="btn-ca" onclick="startRenderEdit(${c.id})">✏ Edit</button>` : ''}
              ${canDelete ? `<button class="btn-ca danger" onclick="softDeleteRenderComment(${c.id})">✕ Delete</button>` : ''}
            </div>` : ''}
            <div id="rr-${c.id}" style="display:none;margin-top:8px;">
              <textarea class="inline-box" id="rrb-${c.id}" rows="2" maxlength="2000" placeholder="Write a reply..."></textarea>
              <div style="display:flex;gap:6px;margin-top:6px;">
                <button class="comment-submit" style="padding:6px 12px;font-size:12px;" onclick="submitRenderReply(${c.id},${renderIdValue})">Reply</button>
                <button class="btn-ca" onclick="document.getElementById('rr-${c.id}').style.display='none'">Cancel</button>
              </div>
            </div>
            <div id="re-${c.id}" style="display:none;margin-top:8px;">
              <textarea class="inline-box" id="reb-${c.id}" rows="2" maxlength="2000">${isDeleted ? '' : escapeHtml(c.content)}</textarea>
              <div style="display:flex;gap:6px;margin-top:6px;">
                <button class="comment-submit" style="padding:6px 12px;font-size:12px;" onclick="submitRenderEdit(${c.id},${renderIdValue})">Save</button>
                <button class="btn-ca" onclick="document.getElementById('re-${c.id}').style.display='none'">Cancel</button>
              </div>
            </div>
            ${(replyMap[c.id]||[]).length ? `<div class="reply-thread">${(replyMap[c.id]||[]).map(r=>renderComment(r,true)).join('')}</div>` : ''}
          </div>`;
      };

      if (!roots?.length) { list.innerHTML = '<div class="msg" style="display:block;margin:0;">No comments yet. Be the first.</div>'; return; }
      list.innerHTML = `<div class="comments">${roots.map(c => renderComment(c)).join('')}</div>`;
    }

    function highlightMentions(text) { return text.replace(/@(\w+)/g, '<span class="mention">@$1</span>'); }

    function startRenderReply(id, username) {
      document.querySelectorAll('[id^="rr-"]').forEach(el => el.style.display = 'none');
      const box = document.getElementById(`rr-${id}`);
      if (box) { box.style.display = 'block'; const ta = document.getElementById(`rrb-${id}`); if (ta) { ta.value = `@${username} `; ta.focus(); } }
    }

    async function submitRenderReply(parentId, renderId) {
      const ta = document.getElementById(`rrb-${parentId}`);
      const txt = ta?.value?.trim();
      if (!txt || !currentUser) return;
      const { error } = await window.sb.from('renders_wallpaper_comments').insert({ render_id: renderId, user_id: currentUser.id, content: txt, parent_id: parentId });
      if (!error) { document.getElementById(`rr-${parentId}`).style.display = 'none'; loadComments(renderId); }
    }

    function startRenderEdit(id) {
      document.querySelectorAll('[id^="re-"]').forEach(el => el.style.display = 'none');
      const box = document.getElementById(`re-${id}`);
      if (box) { box.style.display = 'block'; document.getElementById(`reb-${id}`)?.focus(); }
    }

    async function submitRenderEdit(id, renderId) {
      const ta = document.getElementById(`reb-${id}`);
      const txt = ta?.value?.trim();
      if (!txt || !currentUser) return;
      const { error } = await window.sb.from('renders_wallpaper_comments').update({ content: txt, edited_at: new Date().toISOString() }).eq('id', id).eq('user_id', currentUser.id);
      if (!error) { document.getElementById(`re-${id}`).style.display = 'none'; loadComments(renderId); }
    }

    async function softDeleteRenderComment(id) {
      if (!confirm('Delete this comment? It will show as [deleted].')) return;
      await window.sb.from('renders_wallpaper_comments').update({ deleted_at: new Date().toISOString(), content: '' }).eq('id', id);
      if (currentUpload) loadComments(currentUpload.id);
    }

    async function postComment() {
      const box = document.getElementById('comment-box');
      const msg = document.getElementById('comment-msg');
      const submit = document.getElementById('comment-submit');
      const content = box.value.trim();
      msg.className = 'msg'; msg.textContent = '';
      if (!currentUpload || !content) return;
      const user = currentUser || (window.authUtils?.getCurrentUser ? await window.authUtils.getCurrentUser() : null);
      if (!user) { window.location.href = 'login.html'; return; }
      submit.disabled = true; submit.textContent = 'Posting...';
      const { error } = await window.sb.from('renders_wallpaper_comments').insert({ render_id: currentUpload.id, user_id: user.id, content, parent_id: null });
      submit.disabled = false; submit.textContent = 'Post Comment';
      if (error) { msg.className = 'msg error'; msg.textContent = error.message || 'Failed to post comment.'; return; }
      box.value = '';
      await loadComments(currentUpload.id);
    }

    async function deleteComment(id) {
      if (!confirm('Delete this comment?')) return;
      await window.sb.from('renders_wallpaper_comments').delete().eq('id', id);
      if (currentUpload) await loadComments(currentUpload.id);
    }

    init();

    window.addEventListener('beforeunload', () => {
      window.realtimeUtils.unsubscribe(upvoteChannel);
      window.realtimeUtils.unsubscribe(commentChannel);
    });
  </script>
</body>
</html>
