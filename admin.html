<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — MarineoFPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  :root { --gold: #e8c84a; --bg: #080808; --bg2: #0f0f0f; --bg3: #141414; --bg4: #1a1a1a; --border: #222; --border2: #2a2a2a; --text: #e0e0e0; --text-muted: #666; --text-dim: #999; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); }
  nav { display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 56px; background: rgba(8,8,8,0.97); border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 2px; text-decoration: none; }
  .logo span { color: #fff; }
  .admin-badge { font-size: 11px; background: rgba(232,200,74,0.15); color: var(--gold); border: 1px solid rgba(232,200,74,0.3); padding: 3px 10px; border-radius: 2px; letter-spacing: 1px; }
  .btn-logout { font-size: 12px; padding: 6px 14px; background: transparent; border: 1px solid var(--border2); color: var(--text-muted); border-radius: 3px; cursor: pointer; font-family: 'Barlow', sans-serif; }

  .page-wrap { max-width: 1000px; margin: 0 auto; padding: 40px 32px; }
  .page-title { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .page-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }

  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .tab { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 1px; padding: 12px 18px; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; background: none; border-left: none; border-right: none; border-top: none; transition: all 0.2s; }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  .post-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 20px; margin-bottom: 12px; }
  .post-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 10px; }
  .post-title { font-size: 15px; color: #fff; font-weight: 500; margin-bottom: 4px; }
  .post-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 10px; }
  .post-type { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); background: rgba(232,200,74,0.1); padding: 2px 8px; border-radius: 2px; }
  .post-content { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin: 12px 0; max-height: 100px; overflow: hidden; white-space: pre-wrap; border-left: 2px solid var(--border2); padding-left: 12px; }
  .post-actions { display: flex; gap: 8px; white-space: nowrap; }
  .btn-approve { padding: 7px 16px; background: rgba(50,200,100,0.15); color: #5cdb95; border: 1px solid rgba(50,200,100,0.3); border-radius: 3px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: 'Barlow', sans-serif; transition: all 0.2s; }
  .btn-approve:hover { background: rgba(50,200,100,0.25); }
  .btn-reject { padding: 7px 16px; background: rgba(220,50,50,0.1); color: #ff6b6b; border: 1px solid rgba(220,50,50,0.3); border-radius: 3px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: 'Barlow', sans-serif; transition: all 0.2s; }
  .btn-reject:hover { background: rgba(220,50,50,0.2); }
  .status-badge { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; }
  .status-approved { background: rgba(50,200,100,0.1); color: #5cdb95; }
  .status-rejected { background: rgba(220,50,50,0.1); color: #ff6b6b; }
  .status-pending { background: rgba(232,200,74,0.1); color: var(--gold); }

  .empty { text-align: center; padding: 60px 0; color: var(--text-muted); font-size: 14px; }
  .loading { text-align: center; padding: 40px 0; color: var(--text-muted); }
  .access-denied { text-align: center; padding: 80px 32px; }
  .access-denied h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; color: #ff6b6b; margin-bottom: 12px; }
  .access-denied p { font-size: 14px; color: var(--text-muted); }

  footer { border-top: 1px solid var(--border); padding: 24px 32px; background: var(--bg2); margin-top: 48px; }
  .footer-inner { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; }
  .footer-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: var(--gold); }
  .footer-logo span { color: #555; }
  .footer-text { font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>
<nav>
  <a class="logo" href="index.html">MARINEO<span>FPS</span></a>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="admin-badge">ADMIN PANEL</span>
    <button class="btn-logout" onclick="logout()">Log out</button>
  </div>
</nav>

<div class="page-wrap" id="main-content">
  <div class="loading">Checking access...</div>
</div>

<footer>
  <div class="footer-inner">
    <div class="footer-logo">MARINEO<span>FPS</span></div>
    <div class="footer-text">© 2026 MarineoFPS</div>
  </div>
</footer>

<script>
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let currentTab = 'pending';

  async function init() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) { showDenied('You must be logged in.'); return; }

    const { data: profile } = await sb.from('profiles').select('is_admin, username').eq('id', user.id).single();
    if (!profile?.is_admin) { showDenied('You do not have admin access.'); return; }

    renderAdmin(profile.username);
    loadPosts('pending');
  }

  function showDenied(msg) {
    document.getElementById('main-content').innerHTML = `<div class="access-denied"><h2>Access Denied</h2><p>${msg}</p></div>`;
  }

  function renderAdmin(username) {
    document.getElementById('main-content').innerHTML = `
      <div class="page-title">Admin Panel</div>
      <div class="page-sub">Welcome, ${username}. Review and moderate submitted posts.</div>
      <div class="tabs">
        <button class="tab active" id="tab-pending" onclick="switchTab('pending')">Pending Review</button>
        <button class="tab" id="tab-approved" onclick="switchTab('approved')">Approved</button>
        <button class="tab" id="tab-rejected" onclick="switchTab('rejected')">Rejected</button>
      </div>
      <div id="posts-list"><div class="loading">Loading posts...</div></div>
    `;
  }

  async function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    loadPosts(tab);
  }

  async function loadPosts(status) {
    const list = document.getElementById('posts-list');
    list.innerHTML = '<div class="loading">Loading...</div>';

    const { data: posts, error } = await sb
      .from('posts')
      .select('*, profiles!posts_user_id_fkey(username)')
      .eq('status', status)
      .order('created_at', { ascending: false });

    if (error || !posts?.length) {
      list.innerHTML = `<div class="empty">No ${status} posts.</div>`; return;
    }

    list.innerHTML = posts.map(post => `
      <div class="post-card" id="post-${post.id}">
        <div class="post-header">
          <div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
              <span class="post-type">${post.type}</span>
              <span class="status-badge status-${post.status}">${post.status}</span>
            </div>
            <div class="post-title">${post.title}</div>
            <div class="post-meta">
              <span>by ${post.profiles?.username || 'unknown'}</span>
              <span>·</span>
              <span>${post.game}</span>
              <span>·</span>
              <span>${post.category}</span>
              <span>·</span>
              <span>${new Date(post.created_at).toLocaleDateString()}</span>
            </div>
          </div>
          <div class="post-actions">
            ${status === 'pending' ? `
              <button class="btn-approve" onclick="updatePost(${post.id}, 'approved')">✓ Approve</button>
              <button class="btn-reject" onclick="updatePost(${post.id}, 'rejected')">✕ Reject</button>
            ` : status === 'approved' ? `
              <button class="btn-reject" onclick="updatePost(${post.id}, 'rejected')">✕ Reject</button>
            ` : `
              <button class="btn-approve" onclick="updatePost(${post.id}, 'approved')">✓ Approve</button>
            `}
          </div>
        </div>
        <div class="post-content">${post.content.substring(0, 300)}${post.content.length > 300 ? '...' : ''}</div>
      </div>
    `).join('');
  }

  async function updatePost(id, status) {
    const { error } = await sb.from('posts').update({ status }).eq('id', id);
    if (!error) {
      document.getElementById('post-' + id).remove();
      const list = document.getElementById('posts-list');
      if (!list.querySelector('.post-card')) {
        list.innerHTML = `<div class="empty">No more ${currentTab} posts.</div>`;
      }
    }
  }

  async function logout() {
    await sb.auth.signOut();
    window.location.href = 'index.html';
  }

  init();
</script>
</body>
</html>
