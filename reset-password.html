<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — MarineFPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  :root { --gold: #e8c84a; --bg: #080808; --bg2: #0f0f0f; --bg3: #141414; --bg4: #1a1a1a; --border: #222; --border2: #2a2a2a; --text: #e0e0e0; --text-muted: #666; --text-dim: #999; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
  nav { display: flex; align-items: center; padding: 0 32px; height: 56px; background: rgba(8,8,8,0.97); border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 2px; text-decoration: none; }
  .logo span { color: #fff; }
  .center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
  .card { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 40px; width: 100%; max-width: 420px; }
  .card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .card-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px; }
  input { width: 100%; background: var(--bg4); border: 1px solid var(--border2); color: var(--text); font-family: 'Barlow', sans-serif; font-size: 14px; border-radius: 3px; padding: 11px 14px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: var(--gold); }
  input::placeholder { color: var(--text-muted); }
  .submit-btn { width: 100%; padding: 12px; background: var(--gold); color: #080808; font-weight: 700; font-size: 14px; border: none; border-radius: 3px; cursor: pointer; font-family: 'Barlow', sans-serif; margin-top: 8px; transition: background 0.2s; }
  .submit-btn:hover { background: #f0d060; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg { padding: 12px 14px; border-radius: 3px; font-size: 13px; margin-bottom: 18px; display: none; }
  .msg.error { background: rgba(220,50,50,0.1); border: 1px solid rgba(220,50,50,0.3); color: #ff6b6b; display: block; }
  .msg.success { background: rgba(50,200,100,0.1); border: 1px solid rgba(50,200,100,0.3); color: #5cdb95; display: block; }
</style>
</head>
<body>
<nav><a class="logo" href="index.html">MARINE<span>FPS</span></a></nav>
<div class="center">
  <div class="card">
    <div class="card-title">Reset Password</div>
    <div class="card-sub">Enter your new password below.</div>
    <div class="msg" id="msg"></div>
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="password" placeholder="At least 6 characters...">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat your new password...">
    </div>
    <button class="submit-btn" id="submit-btn" onclick="handleUpdate()">Update Password</button>
  </div>
</div>
<script>
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function handleUpdate() {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const btn = document.getElementById('submit-btn');
    const msg = document.getElementById('msg');
    msg.className = 'msg';

    if (!password || !confirm) {
      msg.className = 'msg error'; msg.textContent = 'Please fill in both fields.'; return;
    }
    if (password.length < 6) {
      msg.className = 'msg error'; msg.textContent = 'Password must be at least 6 characters.'; return;
    }
    if (password !== confirm) {
      msg.className = 'msg error'; msg.textContent = 'Passwords do not match.'; return;
    }

    btn.disabled = true; btn.textContent = 'Updating...';

    const { error } = await sb.auth.updateUser({ password });

    if (error) {
      msg.className = 'msg error'; msg.textContent = error.message;
      btn.disabled = false; btn.textContent = 'Update Password'; return;
    }

    msg.className = 'msg success';
    msg.textContent = 'Password updated! Redirecting to login...';
    setTimeout(() => window.location.href = 'login.html', 2000);
  }
</script>
</body>
</html>
