<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — MarineFPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --gold: #e8c84a; --bg: #080808; --bg2: #0f0f0f; --bg3: #141414; --bg4: #1a1a1a; --border: #222; --border2: #2a2a2a; --text: #e0e0e0; --text-muted: #666; --text-dim: #999; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
  nav { display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 56px; background: rgba(8,8,8,0.97); border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 2px; text-decoration: none; }
  .logo span { color: #fff; }

  .center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
  .card { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 40px; width: 100%; max-width: 400px; }
  .card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .card-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }

  .coming-soon { text-align: center; padding: 32px 0; }
  .coming-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .coming-title { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 600; color: var(--text-dim); margin-bottom: 8px; }
  .coming-sub { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 24px; }
  .back-btn { display: inline-block; padding: 10px 24px; background: var(--gold); color: #080808; font-weight: 600; font-size: 13px; border-radius: 3px; text-decoration: none; font-family: 'Barlow', sans-serif; }

  .switch { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
  .switch a { color: var(--gold); text-decoration: none; }
</style>
</head>
<body>
<nav>
  <a class="logo" href="index.html">MARINE<span>FPS</span></a>
</nav>
<div class="center">
  <div class="card">
    <div class="card-title">Sign Up</div>
    <div class="card-sub">Join the MarineFPS community</div>
    <div class="coming-soon">
      <div class="coming-icon">🚀</div>
      <div class="coming-title">Coming Soon</div>
      <div class="coming-sub">User accounts are being set up. Check back soon — you'll be able to sign up, write guides and upvote posts!</div>
      <a class="back-btn" href="index.html">Back to Home</a>
    </div>
    <div class="switch">Already have an account? <a href="login.html">Log in</a></div>
  </div>
</div>
</body>
</html>
