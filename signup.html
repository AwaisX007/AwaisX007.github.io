<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — MarineoFPS</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
  :root { --gold: #e8c84a; --bg: #080808; --bg2: #0f0f0f; --bg3: #141414; --bg4: #1a1a1a; --border: #222; --border2: #2a2a2a; --text: #e0e0e0; --text-muted: #666; --text-dim: #999; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
  nav { display: flex; align-items: center; padding: 0 32px; height: 56px; background: rgba(8,8,8,0.97); border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 2px; text-decoration: none; }
  .logo span { color: #fff; }
  .center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
  .card { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 40px; width: 100%; max-width: 420px; }
  .card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .card-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px; }
  input { width: 100%; background: var(--bg4); border: 1px solid var(--border2); color: var(--text); font-family: 'Barlow', sans-serif; font-size: 14px; border-radius: 3px; padding: 11px 14px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: var(--gold); }
  input::placeholder { color: var(--text-muted); }
  .field-hint { font-size: 11px; color: var(--text-muted); margin-top: 5px; }
  .submit-btn { width: 100%; padding: 12px; background: var(--gold); color: #080808; font-weight: 700; font-size: 14px; border: none; border-radius: 3px; cursor: pointer; font-family: 'Barlow', sans-serif; margin-top: 8px; transition: background 0.2s; }
  .submit-btn:hover { background: #f0d060; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg { padding: 12px 14px; border-radius: 3px; font-size: 13px; margin-bottom: 18px; display: none; }
  .msg.error { background: rgba(220,50,50,0.1); border: 1px solid rgba(220,50,50,0.3); color: #ff6b6b; display: block; }
  .msg.success { background: rgba(50,200,100,0.1); border: 1px solid rgba(50,200,100,0.3); color: #5cdb95; display: block; }
  .switch { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
  .switch a { color: var(--gold); text-decoration: none; }
  .cf-turnstile { margin-bottom: 12px; }
  footer { border-top: 1px solid var(--border); padding: 24px 32px; background: var(--bg2); margin-top: auto; }
  footer a { transition: opacity 0.2s ease, text-decoration-color 0.2s ease; }
  footer a:hover { opacity: 0.92; text-decoration: underline !important; }
  .footer-inner { max-width: 420px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
  .footer-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: var(--gold); }
  .footer-logo span { color: #555; }
  .footer-text { font-size: 12px; color: var(--text-muted); }
  .footer-links { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
</style>
</head>
<body>
<nav><a class="logo" href="index.html">MARINEO<span>FPS</span></a></nav>
<div class="center">
  <div class="card">
    <div class="card-title">Sign Up</div>
    <div class="card-sub">Join the MarineoFPS community</div>
    <div class="msg" id="msg"></div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Choose a username..." maxlength="20">
      <!-- FIX: hint added so users know what's allowed -->
      <div class="field-hint">Letters, numbers and underscores only. 3–20 characters.</div>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 6 characters...">
    </div>
    <div class="cf-turnstile" data-sitekey="0x4AAAAAACu3ttLPmMW90mOW" data-theme="dark"></div>
    <button class="submit-btn" id="signup-btn" onclick="handleSignup()">Create Account</button>
    <div class="switch">Already have an account? <a href="login.html">Log in</a></div>
  </div>
</div>
<footer data-footer-links="support,discord" data-footer-justify="center">
  <div class="footer-inner">
    <div class="footer-logo">MARINEO<span>FPS</span></div>
    <div class="footer-links"></div>
    <div class="footer-text">© 2026 MarineoFPS. Built for players, by players.</div>
  </div>
</footer>
<script src="footer.js"></script>
<script>
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function handleSignup() {
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('signup-btn');
    const msg = document.getElementById('msg');
    msg.className = 'msg';

    if (!username || !email || !password) {
      msg.className = 'msg error'; msg.textContent = 'Please fill in all fields.'; return;
    }

    // FIX: enforce username format — alphanumeric + underscore, 3–20 chars
    const usernameRegex = /^[a-zA-Z0-9_]{3,20}$/;
    if (!usernameRegex.test(username)) {
      msg.className = 'msg error';
      msg.textContent = 'Username must be 3–20 characters and contain only letters, numbers, or underscores.';
      return;
    }

    if (password.length < 6) {
      msg.className = 'msg error'; msg.textContent = 'Password must be at least 6 characters.'; return;
    }

    const { data: isRegistered, error: lookupError } = await sb.rpc('user_exists_by_email', { check_email: email });
    if (lookupError) {
      msg.className = 'msg error';
      msg.textContent = lookupError.message;
      return;
    }

    if (isRegistered) {
      msg.className = 'msg error';
      msg.textContent = 'User already registered or exists. Please log in or use forgot password if you have forgotten your password.';
      return;
    }

    const token = document.querySelector('[name="cf-turnstile-response"]')?.value;
    if (!token) {
      msg.className = 'msg error'; msg.textContent = 'Please complete the security check.'; return;
    }

    btn.disabled = true; btn.textContent = 'Creating account...';

    const { data, error } = await sb.auth.signUp({
      email,
      password,
      options: {
        data: { username: username },
        captchaToken: token
      }
    });

    if (error) {
      msg.className = 'msg error';
      msg.textContent = /already registered|duplicate key|email address is already registered/i.test(error.message || '')
        ? 'User already registered or exists. Please log in or use forgot password if you have forgotten your password.'
        : error.message;
      btn.disabled = false;
      btn.textContent = 'Create Account';
      return;
    }

    msg.className = 'msg success';
    msg.textContent = '✓ Welcome to MarineoFPS! We sent a confirmation link to your email. Please click it to activate your account.';
    btn.textContent = 'Check Your Email';
    document.getElementById('username').value = '';
    document.getElementById('email').value = '';
    document.getElementById('password').value = '';
  }
</script>
</body>
</html>
